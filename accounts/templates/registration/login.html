<!DOCTYPE html>
{% load static %}
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Agenda Académica</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-primary d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card border-0 shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 15px;">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3 shadow-sm" style="width: 70px; height: 70px; font-size: 2rem;">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h4 class="fw-bold text-dark">Agenda Académica</h4>
            <p class="text-muted small">Inicia a tua sessão para veres os teus compromissos</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 small" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-1"></i>Utilizador ou senha incorretos!
                </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label small fw-bold">Utilizador:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-regular fa-user text-muted"></i></span>
                    <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control bg-light border-start-0" placeholder="Teu utilizador">
                </div>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label small fw-bold">Senha:</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="password" required id="id_password" class="form-control bg-light border-start-0" placeholder="Tua senha">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3 shadow-sm rounded-pill">
                <i class="fa-solid fa-right-to-bracket me-1"></i>Entrar no Painel
            </button>
        </form>

        <div class="text-center border-top pt-3">
            <p class="text-muted small mb-0">Não tens conta? <a href="{% url 'cadastrar' %}" class="text-primary fw-bold text-decoration-none">Regista-te aqui</a></p>
        </div>
    </div>


</body>
</html>
