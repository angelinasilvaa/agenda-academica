<!DOCTYPE html>
{% load static %}
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Concluído - Agenda Académica</title>
    <link rel="stylesheet" href="{% static 'css/cadastrar_sucesso.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="fundo-autenticacao ecra-centrado">

    <div class="card-sucesso-cadastro">
        <div class="bloco-icone-sucesso">
            <i class="fa-solid fa-circle-check fa-4x"></i>
        </div>

        <h3 class="titulo-sucesso-cadastro text-dark">Pronto! Cadastro concluído</h3>

        {% if link_ativacao %}
            <a href="{{ link_ativacao }}" class="botao-sucesso-login">
                <i class="fa-solid fa-right-to-bracket"></i> Fazer Login
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="botao-sucesso-login">
                <i class="fa-solid fa-right-to-bracket"></i> Fazer Login
            </a>
        {% endif %}
    </div>

</body>
</html>
